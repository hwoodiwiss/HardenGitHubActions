name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '11.0.x'
          dotnet-quality: 'preview'

      - name: Test
        run: dotnet test --configuration Release

  publish-nuget:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      contents: read
    environment:
      name: NuGet.org
      url: https://www.nuget.org/profiles/hwoodiwiss

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '11.0.x'
          dotnet-quality: 'preview'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: >
          dotnet pack src/HardenGitHubActions.Cli/HardenGitHubActions.Cli.csproj
          --configuration Release
          -p:Version=${{ steps.version.outputs.VERSION }}

      - name: NuGet login (Trusted Publishing)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        env:
          API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: >
          dotnet nuget push artifacts/package/release/*.nupkg
          --api-key "${API_KEY}"
          --skip-duplicate
          --source https://api.nuget.org/v3/index.json

  publish-binaries:
    name: Publish binary (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    needs: test
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            ext: .exe
          - rid: win-arm64
            os: windows-latest
            ext: .exe
          - rid: linux-x64
            os: ubuntu-latest
            ext: ''
          - rid: linux-arm64
            os: ubuntu-latest
            ext: ''
          - rid: osx-arm64
            os: macos-latest
            ext: ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '11.0.x'
          dotnet-quality: 'preview'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: >
          dotnet publish src/HardenGitHubActions.Cli/HardenGitHubActions.Cli.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained
          -p:PublishSingleFile=true
          -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Rename binary
        shell: bash
        run: >
          mv
          artifacts/publish/HardenGitHubActions.Cli/release_${{ matrix.rid }}/harden-actions${{ matrix.ext }}
          harden-actions-${{ matrix.rid }}${{ matrix.ext }}

      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.ref_name }} harden-actions-${{ matrix.rid }}${{ matrix.ext }}
