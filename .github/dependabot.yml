version: 2
updates:
  # GitHub Actions used in workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]

  # .NET NuGet packages — central package management reads Directory.Packages.props at root
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      microsoft-extensions:
        patterns: ["Microsoft.Extensions.*"]
      spectre:
        patterns: ["Spectre.*"]
      test:
        patterns: ["TUnit*", "*.Testing*"]

  # .NET SDK version in global.json
  - package-ecosystem: "dotnet-sdk"
    directory: "/"
    schedule:
      interval: "weekly"
